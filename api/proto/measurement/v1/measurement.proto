syntax = "proto3";

package measurement.v1;

option go_package = "github.com/aitra-ai/aitra-meter/api/proto/measurement/v1;measurementv1";

// MeasurementService receives energy + token reports from measurement agents
// and acknowledges each window.
service MeasurementService {
  rpc ReportWindow(WindowReport) returns (WindowAck);
}

// WindowReport is sent by a measurement agent at the end of each measurement
// window. It carries energy, token counts, and stability metadata.
message WindowReport {
  // Opaque ID generated by the agent; used for deduplication.
  string window_id = 1;

  // Kubernetes node name the agent is running on.
  string node = 2;

  // Name of the model being served (from inference provider label).
  string model_name = 3;

  // GPU energy consumed during this window in joules.
  double energy_joules = 4;

  // Cumulative output tokens at window end (aggregation service deltas these).
  uint64 output_tokens = 5;

  // GPU power draw snapshot taken at window end, in watts.
  double power_watts = 6;

  // Whether the CV gate passed (CV < 3%) for this window.
  bool stable = 7;

  // Coefficient of variation for this window.
  double cv = 8;

  // Energy provider identifier (e.g. "zeus", "nvml").
  string energy_provider = 9;

  // Inference provider identifier (e.g. "vllm", "generic-prometheus").
  string inference_provider = 10;

  // Unix timestamp in milliseconds at the end of the window.
  int64 timestamp_unix_ms = 11;
}

// WindowAck is returned by the aggregation service after processing a report.
message WindowAck {
  // Whether the report was accepted for aggregation.
  // False means the window was rejected (e.g. unstable, duplicate window_id).
  bool accepted = 1;
}
