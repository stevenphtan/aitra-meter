apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: siteconfigs.aitra-ai.github.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: aitra-ai.github.io
  names:
    kind: SiteConfig
    listKind: SiteConfigList
    plural: siteconfigs
    singular: siteconfig
    shortNames:
      - sc
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                gridZone:
                  type: string
                  description: ElectricityMaps zone identifier
                electricityCostPerKwh:
                  type: number
                  description: Electricity cost in USD per kWh
                pue:
                  type: number
                  description: Power Usage Effectiveness — applied as multiplier in chargeback
                  default: 1.0
                carbonIntensityFallback:
                  type: number
                  description: gCO2/kWh — used when carbon API is unavailable
                carbonSource:
                  type: string
                  enum: [electricitymaps, watttime, manual]
                  default: manual
