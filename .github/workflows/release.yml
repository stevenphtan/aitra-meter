name: Release

on:
  push:
    tags:
      - 'v*'

env:
  IMAGE_PREFIX: ghcr.io/aitra-ai/aitra-meter

jobs:
  release:
    name: Build and push images
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract version
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push measurement-agent
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/measurement-agent/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/measurement-agent:${{ steps.tag.outputs.VERSION }}
            ${{ env.IMAGE_PREFIX }}/measurement-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push aggregation-service
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/aggregation-service/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/aggregation-service:${{ steps.tag.outputs.VERSION }}
            ${{ env.IMAGE_PREFIX }}/aggregation-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push dashboard
        uses: docker/build-push-action@v7
        with:
          context: dashboard
          file: dashboard/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/dashboard:${{ steps.tag.outputs.VERSION }}
            ${{ env.IMAGE_PREFIX }}/dashboard:latest

      - name: Package Helm chart
        run: |
          helm package helm/aitra-meter \
            --version ${{ steps.tag.outputs.VERSION }} \
            --app-version ${{ steps.tag.outputs.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: aitra-meter-*.tgz
