name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: # enables manual trigger for GPU integration tests

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.15.0

      - name: Lint Helm chart
        # cluster.name is required at deploy time; pass a placeholder for lint.
        run: helm lint helm/aitra-meter --set cluster.name=ci-lint

  nvml-integration:
    name: NVML integration tests (GPU)
    # Runs only on a self-hosted runner labelled "gpu". The job is skipped on
    # runners without that label. Register a GPU node with:
    #   ./config.sh --labels gpu --name <runner-name>
    runs-on: [self-hosted, gpu]
    # Manual trigger only — don't block PRs on GPU availability.
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run NVML integration tests
        run: |
          go test -tags 'linux integration' \
            -v -timeout 300s \
            ./internal/provider/energy/nvml/... \
        env:
          CGO_ENABLED: "1"
